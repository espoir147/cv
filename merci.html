<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message envoyé - ESPOH</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0a0a0a;
            --accent: #00ff88;
            --accent-glow: rgba(0, 255, 136, 0.3);
            --text: #ffffff;
            --text-dim: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 136, 0.03) 0px,
                rgba(0, 0, 0, 0) 1px,
                rgba(0, 0, 0, 0) 2px
            );
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 600px;
            margin: 20px;
            position: relative;
            z-index: 2;
        }

        .thankyou-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 0 40px var(--accent-glow);
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .checkmark {
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            background: rgba(0, 255, 136, 0.1);
            border: 2px solid var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
            animation: scaleIn 0.5s ease 0.3s both;
        }

        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent-glow);
            font-family: 'Poppins', sans-serif;
        }

        .thankyou-message {
            font-size: 1.2rem;
            color: var(--text-dim);
            margin-bottom: 15px;
        }

        .divider {
            width: 80px;
            height: 2px;
            background: var(--accent);
            margin: 25px auto;
            border-radius: 2px;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .info-text {
            color: var(--text-dim);
            line-height: 1.8;
            margin-bottom: 25px;
        }

        .response-time {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 50px;
            padding: 12px 25px;
            display: inline-block;
            margin-bottom: 30px;
            color: var(--text-dim);
        }

        .response-time i {
            margin-right: 10px;
            color: var(--accent);
        }

        .btn-back {
            display: inline-block;
            padding: 15px 40px;
            background: var(--accent);
            color: var(--primary);
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .btn-back:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 50px var(--accent-glow);
        }

        .btn-back i { margin-left: 8px; }

        .auto-redirect {
            margin-top: 25px;
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .auto-redirect i {
            color: var(--accent);
            margin: 0 5px;
        }

        .social-links {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-link {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            transition: all 0.3s ease;
            font-size: 1.1rem;
            text-decoration: none;
        }

        .social-link:hover {
            background: var(--accent);
            color: var(--primary);
            border-color: var(--accent);
            transform: translateY(-5px);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 2px;
            margin-bottom: 30px;
            display: block;
            text-shadow: 0 0 10px var(--accent-glow);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="thankyou-card">
            <span class="logo">ESPOH</span>

            <div class="checkmark">
                <i class="fas fa-check"></i>
            </div>

            <h1>Message envoyé !</h1>
            <p class="thankyou-message">Merci de m'avoir contacté</p>

            <div class="divider"></div>

            <p class="info-text">
                J'ai bien reçu votre message et je l'ai pris en compte.<br>
                Je vous répondrai dans les plus brefs délais.
            </p>

            <div class="response-time">
                <i class="fas fa-clock"></i> Délai de réponse : 24h - 48h
            </div>

            <br><br>

            <a href="index.html" class="btn-back">
                Retour à l'accueil <i class="fas fa-arrow-right"></i>
            </a>

            <div class="auto-redirect">
                <i class="fas fa-redo-alt"></i> Redirection automatique dans <span id="countdown">10</span> secondes...
            </div>

            <div class="social-links">
                <a href="https://github.com/espoir147" class="social-link"><i class="fab fa-github"></i></a>
                <a href="https://www.linkedin.com/in/espoir-sehoun-55021a36b" class="social-link"><i class="fab fa-linkedin-in"></i></a>
                <a href="https://x.com/takagi147" class="social-link"><i class="fab fa-twitter"></i></a>
                <a href="https://instagram.com/espoir_sehoun" class="social-link"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </div>

    <script>
        let seconds = 10;
        const countdownEl = document.getElementById('countdown');
        let interval = setInterval(() => {
            seconds--;
            if (countdownEl) countdownEl.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(interval);
                window.location.href = 'index.html';
            }
        }, 1000);

        // Pause redirection au survol du bouton
        const btnBack = document.querySelector('.btn-back');
        btnBack.addEventListener('mouseenter', () => clearInterval(interval));
        btnBack.addEventListener('mouseleave', () => {
            interval = setInterval(() => {
                seconds--;
                if (countdownEl) countdownEl.textContent = seconds;
                if (seconds <= 0) {
                    clearInterval(interval);
                    window.location.href = 'index.html';
                }
            }, 1000);
        });
    </script>
</body>
</html>
